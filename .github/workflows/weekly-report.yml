name: Wöchentlicher Statusbericht

on:
  schedule:
    # Jeden Mittwoch um 07:00 UTC = 08:00 Deutschland (Sommerzeit)
    - cron: '0 7 * * 3'
  workflow_dispatch:
    # Manuell auslösbar über GitHub Actions UI

jobs:
  statusbericht:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python Dependencies installieren
        run: pip install requests google-auth google-auth-httplib2 google-api-python-client

      - name: Erledigte Tasks aus ClickUp holen
        id: clickup
        run: |
          python3 << 'PYTHON'
          import os, json, requests
          from datetime import datetime, timedelta

          api_key = os.environ['CLICKUP_API_KEY']
          list_ids = [
              os.environ['CLICKUP_LIST_ID_PHASE1'],
              os.environ['CLICKUP_LIST_ID_PHASE2'],
              os.environ['CLICKUP_LIST_ID_PHASE3'],
              os.environ['CLICKUP_LIST_ID_PHASE4'],
          ]
          
          # Letzte 7 Tage
          since = int((datetime.now() - timedelta(days=7)).timestamp() * 1000)
          
          all_tasks = []
          for list_id in list_ids:
              url = f"https://api.clickup.com/api/v2/list/{list_id}/task"
              params = {'date_updated_gt': since, 'include_closed': True}
              headers = {'Authorization': api_key}
              r = requests.get(url, headers=headers, params=params)
              if r.status_code == 200:
                  tasks = r.json().get('tasks', [])
                  all_tasks.extend(tasks)
          
          done = [t for t in all_tasks if t.get('status', {}).get('status', '').lower() in ['complete', 'done', 'closed']]
          inprogress = [t for t in all_tasks if t.get('status', {}).get('status', '').lower() in ['in progress', 'active', 'in arbeit']]
          
          summary = f"ERLEDIGT ({len(done)}):\n"
          for t in done:
              summary += f"- {t['name']}\n"
          
          summary += f"\nIN ARBEIT ({len(inprogress)}):\n"
          for t in inprogress:
              summary += f"- {t['name']}\n"
          
          with open('/tmp/clickup_summary.txt', 'w') as f:
              f.write(summary)
          
          print(summary)
          PYTHON
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_LIST_ID_PHASE1: ${{ secrets.CLICKUP_LIST_ID_PHASE1 }}
          CLICKUP_LIST_ID_PHASE2: ${{ secrets.CLICKUP_LIST_ID_PHASE2 }}
          CLICKUP_LIST_ID_PHASE3: ${{ secrets.CLICKUP_LIST_ID_PHASE3 }}
          CLICKUP_LIST_ID_PHASE4: ${{ secrets.CLICKUP_LIST_ID_PHASE4 }}

      - name: Statusbericht via Claude API generieren
        id: bericht
        run: |
          CLICKUP_DATA=$(cat /tmp/clickup_summary.txt)
          KW=$(date '+%V')
          DATUM=$(date '+%d.%m.%Y')
          
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$(python3 -c "
          import json
          data = {
            'model': 'claude-opus-4-5',
            'max_tokens': 1500,
            'messages': [{
              'role': 'user',
              'content': '''Du bist der Projektmanager-Assistent für Sentimental Logic.
          
          Projekt: Sentimental Logic — Prozessautomatisierung Versicherungsvertrieb
          Kunde: Melih Gül
          Auftraggeber: Jose Luis Rodriguez Arboleda (Online First)
          Aktuell: Phase 1 — Grundgerüst (Juni 2026)
          
          ClickUp Tasks diese Woche:
          $CLICKUP_DATA
          
          Schreibe einen professionellen Statusbericht auf Deutsch für KW $KW ($DATUM).
          Format:
          # Statusbericht KW $KW — $DATUM
          
          ## Diese Woche abgeschlossen
          [aus ClickUp Daten]
          
          ## In Arbeit
          [aus ClickUp Daten]
          
          ## Nächste Woche geplant
          [logische nächste Schritte basierend auf Phase 1 Plan]
          
          ## Offene Punkte
          [was könnte den Fortschritt blockieren]
          
          ## Gesamtfortschritt Phase 1
          [Einschätzung in %]
          
          Nur den Berichtstext ausgeben.'''
            }]
          }
          print(json.dumps(data))
          ")")
          
          BERICHT=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['content'][0]['text'])")
          
          DATUM_FILE=$(date '+%Y-%m-%d')
          echo "$BERICHT" > /tmp/Statusbericht_KW${KW}_${DATUM_FILE}.md
          echo "filename=Statusbericht_KW${KW}_${DATUM_FILE}.md" >> $GITHUB_OUTPUT
          echo "bericht<<EOF" >> $GITHUB_OUTPUT
          echo "$BERICHT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Statusbericht in Google Drive ablegen
        run: |
          python3 << 'PYTHON'
          import os, json, glob
          
          creds_json = os.environ.get('GOOGLE_SERVICE_ACCOUNT_KEY', '')
          if not creds_json:
              print("Kein Google Service Account Key — Drive Upload übersprungen")
              exit(0)
          
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          
          creds_data = json.loads(creds_json)
          creds = service_account.Credentials.from_service_account_info(
              creds_data,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)
          
          files = glob.glob('/tmp/Statusbericht_*.md')
          if not files:
              print("Keine Statusbericht-Datei gefunden")
              exit(0)
              
          filepath = files[0]
          filename = os.path.basename(filepath)
          
          file_metadata = {
              'name': filename,
              'parents': [os.environ['GOOGLE_DRIVE_FOLDER_ID']]
          }
          media = MediaFileUpload(filepath, mimetype='text/plain')
          service.files().create(body=file_metadata, media_body=media).execute()
          print(f"Statusbericht abgelegt: {filename}")
          PYTHON
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: WhatsApp Benachrichtigung
        run: |
          KW=$(date '+%V')
          MSG="📊 Statusbericht KW${KW} ist fertig und in Drive abgelegt. Bitte kurz prüfen vor dem Donnerstag-Call mit Melih."
          
          curl -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.CALLMEBOT_PHONE }}&text=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$MSG'))")&apikey=${{ secrets.CALLMEBOT_API_KEY }}"
